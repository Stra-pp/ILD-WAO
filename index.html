body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--sand);color:var(--ink);-webkit-font-smoothing:antialiased}

.fdel{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;width:22px;height:22px;font-size:12px}
.fnum{position:absolute;bottom:2px;left:2px;background:rgba(0,0,0,.55);color:#fff;border-radius:6px;font-size:10px;padding:0 5px}
.kv{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:7px 0;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:none}

.note{border-radius:12px;padding:12px 13px;margin:10px 0;font-size:13.5px}

.note.jef{background:#f3eafc;border:1px solid #d9c2f0}
.note.ger{background:#e9f7f0;border:1px solid #aedcc6}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}

.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center;box-shadow:var(--shadow)}

.kpi .kl{font-size:11px;color:var(--muted);margin-top:2px}
.barline{margin-bottom:11px}
.barline .lab{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:3px}
.barwrap{display:flex;height:10px;border-radius:6px;overflow:hidden;background:#eee7da}
.stars{display:flex;gap:4px;font-size:24px}
.stars span{cursor:pointer;color:#d8d2c5}
.stars span.on{color:var(--amber)}
.kan{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px}
.kcol{flex:0 0 80%;max-width:300px;background:#efe9de;border-radius:16px;padding:11px}

.kcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:9px;box-shadow:var(--shadow)}
.kcol.over{outline:2px dashed var(--ocean);outline-offset:-4px}
.kchip{display:inline-block;font-size:10.5px;font-weight:700;border-radius:999px;padding:2px 8px;background:#eef3f6;color:#3c5b66}
.kchip.urg{background:#fbe6e6;color:#a83232}
.kcol h4 .dotc{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:middle}

.kfilters select{flex:1;min-width:150px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;font-size:14px}
.kcount{font-size:12px;color:var(--muted);margin:-4px 0 12px}
.dgrp{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.dgrp .ghead{background:var(--ocean);color:#fff;font-weight:800;font-size:13px;letter-spacing:.4px;padding:11px 14px;display:flex;align-items:center;gap:8px}
.dscroll{overflow-x:auto}
.dtable{width:100%;border-collapse:collapse;min-width:560px}
.dtable th{background:#f6f2ea;color:var(--muted);font-size:10.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;padding:9px 8px;text-align:center;white-space:nowrap}

.login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;
  background:radial-gradient(120% 80% at 50% -10%, #14808a 0%, var(--ocean) 42%, var(--ocean-d) 78%, #073e43 100%)}

  background:radial-gradient(circle, rgba(255,196,140,.45) 0%, rgba(232,102,61,.12) 55%, transparent 70%);pointer-events:none}
.login .wave{position:absolute;bottom:0;left:0;right:0;height:120px;background:
  radial-gradient(120% 100% at 50% 120%, rgba(255,255,255,.10), transparent 60%);pointer-events:none}
.lcard{position:relative;z-index:2;background:rgba(255,255,255,.97);border-radius:24px;padding:26px 22px;width:100%;max-width:380px;

.lpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

.lback{margin-top:16px;color:var(--ocean-d);font-weight:700;font-size:14px;background:none}
.lerr{color:var(--red);font-weight:600;font-size:13px;min-height:18px;margin-top:8px}

.h1{font-family:'Bebas Neue',sans-serif;font-weight:400;letter-spacing:.6px;font-size:30px}
.card h3{font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.2px}
.lbrand,.ltag,.topbar .who,.seg button{font-family:'Barlow Condensed',sans-serif}

function comprimirImg(dataUrl,maxPx=900,q=0.75){
  return new Promise(res=>{ const img=new Image();
    img.onload=()=>{ let w=img.width,h=img.height;
      if(w>maxPx||h>maxPx){const s=Math.min(maxPx/w,maxPx/h);w=Math.round(w*s);h=Math.round(h*s);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q)); };
    img.onerror=()=>res(dataUrl); img.src=dataUrl; });
}

const COLL={ILD:"ild", Notif:"notif"};
let _wcache={};   // hash por id para escribir solo lo cambiado
const GoogleStore = {
  async read(t){
    if(t==="ILD_Config"){ try{ const d=await fbDb.collection("config").doc("ild").get(); return d.exists?(d.data().value||{}):{}; }catch(e){ return {}; } }
    try{ const coll=COLL[t]||t.toLowerCase(); const snap=await fbDb.collection(coll).get();
      const arr=snap.docs.map(d=>d.data());
      _wcache[t]=new Map(arr.map(r=>[String(r.id||r.Codigo), JSON.stringify(r)]));
      return arr;
    }catch(e){ return []; }
  },
  async write(t,val){
    if(t==="ILD_Config"){ await fbDb.collection("config").doc("ild").set({value:val}); return; }
    const coll=COLL[t]||t.toLowerCase(); const arr=val||[];
    const prev=_wcache[t]||new Map(); const next=new Map();
    let batch=fbDb.batch(), ops=0; const commits=[];
    const flush=()=>{ if(ops>0){ commits.push(batch.commit()); batch=fbDb.batch(); ops=0; } };
    for(const rec of arr){ const id=String(rec.id||rec.Codigo); const j=JSON.stringify(rec); next.set(id,j);
      if(prev.get(id)!==j){ batch.set(fbDb.collection(coll).doc(id), rec); ops++; if(ops>=400) flush(); } }
    for(const id of prev.keys()){ if(!next.has(id)){ batch.delete(fbDb.collection(coll).doc(id)); ops++; if(ops>=400) flush(); } }
    flush(); await Promise.all(commits); _wcache[t]=next;
  },
  async ensureCarpeta(){ /* no aplica en Firebase */ },
  async putFoto(dataUrl,nombre,carpetaId){
    const ref=fbDb.collection("ild_fotos").doc();
    await ref.set({ildId:carpetaId, nombre, data:dataUrl, ts:Date.now()});
    return {nombre, path:ref.id, carpeta:carpetaId};
  },
  async uploadFoto(dataUrl,nombre,carpetaId){ return this.putFoto(dataUrl,nombre,carpetaId); },
  async getImg(idOrPath){
    try{ const d=await fbDb.collection("ild_fotos").doc(idOrPath).get(); return d.exists?(d.data().data||""):""; }catch(e){ return ""; }
  }
};

async function limpiarFotosViejas(){
  const corte=Date.now()-60*24*3600*1000; let borradas=0;
  const snap=await fbDb.collection("ild_fotos").where("ts","<",corte).get();
  let batch=fbDb.batch(), ops=0; const commits=[];
  snap.docs.forEach(d=>{ batch.delete(d.ref); ops++; borradas++; if(ops>=400){ commits.push(batch.commit()); batch=fbDb.batch(); ops=0; } });
  if(ops>0) commits.push(batch.commit()); await Promise.all(commits);
  return borradas;
}

const DIAS_CFG = { feriados:[], areas:{} };  // areas[area] = {patron:'diario'|'finde'|'vsd'|'personalizado', dias:[0..6]}
function patronDias(p){ return p==='finde'?[0,6]:p==='vsd'?[0,5,6]:p==='diario'?[0,1,2,3,4,5,6]:null; }
function diasEsperados(area,year,month,hastaHoy){
  const cfg=DIAS_CFG.areas[area]||{patron:'diario'};
  if(cfg.patron==='evento') return Number(cfg.mes)||0;
  if(cfg.patron==='mensual') return 1;
  let set = cfg.patron==='personalizado' ? (cfg.dias||[]) : patronDias(cfg.patron);
  if(!set) set=[0,1,2,3,4,5,6];
  const hoy=new Date(); const lastDay=new Date(year,month+1,0).getDate();
  const limit = (hastaHoy && hoy.getFullYear()===year && hoy.getMonth()===month) ? hoy.getDate() : lastDay;
  const fer=(DIAS_CFG.feriados||[]).map(f=>new Date(f+"T00:00:00")).filter(d=>d.getFullYear()===year&&d.getMonth()===month).map(d=>d.getDate());
  let n=0; for(let d=1; d<=limit; d++){ const wd=new Date(year,month,d).getDay(); if(set.includes(wd)||fer.includes(d)) n++; }
  return n;
}

  if(!rows||!rows.length) return false;
  const clean=rows.map(r=>{ const o={...r}; delete o.Fotos; delete o.fotos; delete o.checks; delete o.textos; delete o.selecciones;
    Object.keys(o).forEach(k=>{ if(o[k]&&typeof o[k]==="object") o[k]=JSON.stringify(o[k]); }); return o; });
  if(window.XLSX && !window.__noXlsx){
    const ws=XLSX.utils.json_to_sheet(clean); const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,(sheet||"Datos").slice(0,31)); XLSX.writeFile(wb,filename+".xlsx"); return true; }
  const head=[...new Set(clean.flatMap(o=>Object.keys(o)))];
  const csv=[head.join(",")].concat(clean.map(r=>head.map(h=>`"${String(r[h]??"").replace(/"/g,'""')}"`).join(","))).join("\n");
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob(["﻿"+csv],{type:"text/csv"})); a.download=filename+".csv"; a.click(); return true;
}

    if(selFaltan.length){toast("Elige una opción en: "+itemText(selFaltan[0].it));return;}

  const esSuyo=r=>(user.areas||[]).includes(r.area)||r.aprobadorEsperado===user.nombre||r.aprobador===user.nombre;
  if(!esGD(user)) base=base.filter(esSuyo);
  if(filtro!=="todos") base=base.filter(r=>r.estado===filtro);
  if(loc!=="todas") base=base.filter(r=>r.localidad===loc);
  // Histórico completo de la jefatura (para exportar, sin filtro de período)
  const mios=esGD(user)?regs:regs.filter(esSuyo);
  function exportar(){ if(!mios.length){toast("No hay ILD para exportar");return;}
    const ok=exportXLSX(mios.map(ildToRow),"ILD",`ILD_${esGD(user)?"General":user.nombre.replace(/\s+/g,"_")}_${yr()}`);
    if(ok) toast("Exportando "+mios.length+" ILD…"); }

function ChecklistEditor({user,toast,onSave}){
  const [,force]=useState(0);
  const areas = esGD(user)?Object.keys(AC):(user.areas||[]);
  const norm = it => (typeof it==='object'&&it)?{t:it.t,tipo:it.tipo||'foto'}:{t:it,tipo:'foto'};
  const [area,setArea]=useState(areas[0]||"");
  const [items,setItems]=useState(()=> (CL[area]||[]).map(norm));
  useEffect(()=>{ setItems((CL[area]||[]).map(norm)); },[area]);
  const TIPOS=[["foto","📷 Foto"],["sino","✅ Sí / No / N/A"],["texto","📝 Texto"],["apertura_cierre","🔁 Apertura/Cierre"],["comida","🍽️ Desayuno/Almuerzo/Cena"]];
  const upd=(i,k,v)=>setItems(arr=>arr.map((it,j)=>j===i?{...it,[k]:v}:it));
  const del=i=>setItems(arr=>arr.filter((_,j)=>j!==i));
  const mover=(i,d)=>setItems(arr=>{ const j=i+d; if(j<0||j>=arr.length)return arr; const c=[...arr]; [c[i],c[j]]=[c[j],c[i]]; return c; });
  const add=()=>setItems(arr=>[...arr,{t:"",tipo:"foto"}]);
  async function guardar(){ const prev=(CL[area]||[]).map(norm);
    const clean=items.filter(it=>String(it.t).trim()).map(it=>({t:it.t.trim(),tipo:it.tipo}));
    const pT=prev.map(x=>x.t), nT=clean.map(x=>x.t);
    const agreg=nT.filter(t=>!pT.includes(t)), elim=pT.filter(t=>!nT.includes(t));
    CL[area]=clean; onSave(); toast("Checklist actualizado: "+area);
    if(user.rol!=='desarrollador'){
      let det=[]; if(agreg.length) det.push(`agregó ${agreg.length} ítem(s): ${agreg.slice(0,3).join(", ")}${agreg.length>3?"…":""}`);
      if(elim.length) det.push(`eliminó ${elim.length} ítem(s): ${elim.slice(0,3).join(", ")}${elim.length>3?"…":""}`);
      if(!det.length) det.push("modificó ítems o tipos");
      await addNotif("Desarrollador", `${user.nombre} cambió el checklist de "${area}" (${det.join("; ")}).`, "", area);
    }
  }
  const [modo,setModo]=useState(()=>areaModo(area));
  useEffect(()=>{ setModo(areaModo(area)); },[area]);
  function cambiarModo(v){ setModo(v); AMODO[area]=v; }
  async function renombrarArea(a){ const nv=prompt("Nuevo nombre del ILD:", a); if(nv==null) return;
    const v=nv.trim(); if(!v||v===a) return; if(AC[v]){ toast("Ya existe un ILD con ese nombre"); return; }
    AC[v]=AC[a]; delete AC[a];
    if(APR[a]!==undefined){ APR[v]=APR[a]; delete APR[a]; }
    if(CL[a]!==undefined){ CL[v]=CL[a]; delete CL[a]; }
    if(AMODO[a]!==undefined){ AMODO[v]=AMODO[a]; delete AMODO[a]; }
    USERS.forEach(u=>{ if(u.areas) u.areas=u.areas.map(x=>x===a?v:x); });
    onSave(); if(area===a) setArea(v); force(x=>x+1);
    if(confirm(`ILD renombrado. ¿Actualizar también los registros ya guardados de "${a}" al nuevo nombre? (recomendado, para que cuenten en el dashboard)`)){
      try{ const all=await Store.read("ILD"); let n=0;
        const upd=all.map(r=>{ if(r.area===a){ n++; return {...r,area:v}; } return r; });
        if(n){ await Store.write("ILD",upd); toast(`Renombrado · ${n} registro(s) actualizados`); } else toast("ILD renombrado");
      }catch(e){ toast("Renombrado, pero no pude actualizar registros: "+(e.message||"")); }
    } else toast("ILD renombrado a: "+v); }
  function borrarArea(a){ if(!confirm(`¿Eliminar el ILD "${a}"? Los registros ya guardados NO se borran.`)) return;
    delete AC[a]; delete APR[a]; delete CL[a]; delete AMODO[a];
    USERS.forEach(u=>{ if(u.areas) u.areas=u.areas.filter(x=>x!==a); });
    onSave(); if(area===a){ const rest=Object.keys(AC); setArea(rest[0]||""); } force(x=>x+1); toast("ILD eliminado: "+a); }
  if(!areas.length) return <div className="empty"><div className="e">🔒</div>No tienes áreas asignadas para personalizar.</div>;
  const nFotos=items.filter(it=>it.tipo==='foto').length;
  return <div>
    {esDev(user) && <div className="card"><h3>🗂 Administrar ILD ({Object.keys(AC).length})</h3>
      <div className="hint" style={{marginBottom:8}}>Renombra o elimina cualquier ILD. Los registros históricos no se borran.</div>
      <div style={{maxHeight:300,overflow:"auto",border:"1px solid var(--line)",borderRadius:12}}>
        {Object.keys(AC).map(a=><div className="kv" key={a} style={{padding:"8px 12px",margin:0,borderBottom:"1px solid #f3efe6"}}>
          <span style={{flex:1,fontSize:13.5,color:"var(--ink)"}}>{a}</span>
          <span className="row" style={{gap:6,flex:"0 0 auto"}}>
            <button className="btn ghost" style={{padding:"5px 10px"}} onClick={()=>renombrarArea(a)}>✏️</button>
            <button className="btn red" style={{padding:"5px 10px"}} onClick={()=>borrarArea(a)}>🗑</button></span></div>)}
      </div></div>}
    <div className="card"><Field label="Área a personalizar">
      <select className="inp" value={area} onChange={e=>setArea(e.target.value)}>{areas.map(a=><option key={a}>{a}</option>)}</select></Field>
      <Field label="Modo del ILD" hint="'Lista' = el usuario elige UNA opción de la lista y sube de 3 a 5 fotos (ideal Áreas Públicas). 'Normal' = checklist completo.">
        <select className="inp" value={modo} onChange={e=>cambiarModo(e.target.value)}>
          <option value="normal">Checklist normal</option>
          <option value="lista">Lista (elegir una opción + 3 a 5 fotos)</option></select></Field>
      <div className="hint">{items.length} {modo==='lista'?"opciones de la lista":"ítems"} · {modo==='lista'?"el usuario elige una opción":`Fotos requeridas = ${nFotos}`}.</div></div>
    {items.map((it,i)=><div key={i} className="card" style={{padding:12}}>
      <div className="row" style={{gap:8,alignItems:"flex-start"}}>
        <div style={{flex:"0 0 20px",color:"var(--muted)",fontWeight:700,paddingTop:11}}>{i+1}</div>
        <div style={{flex:1}}>
          <input className="inp" value={it.t} onChange={e=>upd(i,"t",e.target.value)} placeholder="Texto del ítem"/>
          <select className="inp" style={{marginTop:8}} value={it.tipo} onChange={e=>upd(i,"tipo",e.target.value)}>{TIPOS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
          <div className="row" style={{marginTop:8,gap:6}}>
            <button className="btn ghost" style={{padding:"6px 11px"}} onClick={()=>mover(i,-1)}>↑</button>
            <button className="btn ghost" style={{padding:"6px 11px"}} onClick={()=>mover(i,1)}>↓</button>
            <button className="btn red" style={{padding:"6px 11px"}} onClick={()=>del(i)}>🗑 Quitar</button>
          </div>
        </div></div></div>)}
    <button className="btn ghost block" onClick={add}>➕ Agregar ítem</button>
    <button className="btn primary block" style={{marginTop:10}} onClick={guardar}>💾 Guardar checklist</button>
  </div>;
}

            <td style={{textAlign:"center",fontWeight:800}}>{g.cumpl}%</td></tr>)}
            {!tabla.length && <tr><td colSpan={6} className="hint" style={{padding:"14px 0",textAlign:"center"}}>Sin datos en el período</td></tr>}</tbody>
        </table></div></div>
    </React.Fragment>}
  </div>;
}
/* ===== TABLEROS EN TIEMPO REAL (Compras / Sistemas / Mantenimiento) ===== */
function dFiltro(rows,campo,anio,mes){
  return rows.filter(r=>{ const d=r[campo]?new Date(r[campo]):null; if(!d||isNaN(d)) return false;
    if(anio && d.getFullYear()!==anio) return false;
    if(mes!=null && d.getMonth()!==mes) return false; return true; });
}
function dCuenta(rows,campo){ const m={}; rows.forEach(r=>{ const k=(r[campo]||"—"); m[k]=(m[k]||0)+1; });
  return Object.entries(m).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value); }
function dPromDias(rows,ini,fin){ const ds=rows.map(r=>{ if(!r[ini]||!r[fin])return null; const a=new Date(r[ini]),b=new Date(r[fin]);
    if(isNaN(a)||isNaN(b))return null; return (b-a)/86400000; }).filter(x=>x!=null);
  return ds.length?(ds.reduce((s,x)=>s+x,0)/ds.length).toFixed(1):"—"; }
function fmtDur(min){ if(min==null||isNaN(min)) return "—"; let m=Math.round(min);
  const d=Math.floor(m/1440); m-=d*1440; const h=Math.floor(m/60); m-=h*60;
  const p=[]; if(d) p.push(d+"d"); if(h) p.push(h+"h"); p.push(m+"min"); return p.join(" "); }
function dPromMin(rows,ini,fin){ const ds=rows.map(r=>{ if(!r[ini]||!r[fin])return null; const a=new Date(r[ini]),b=new Date(r[fin]);
    if(isNaN(a)||isNaN(b))return null; return (b-a)/60000; }).filter(x=>x!=null);
  return ds.length?fmtDur(ds.reduce((s,x)=>s+x,0)/ds.length):"—"; }
function dPromCal(rows){ const cs=rows.map(r=>Number(r.EncuestaCal)).filter(x=>x>0);
  return cs.length?(cs.reduce((s,x)=>s+x,0)/cs.length).toFixed(2):"—"; }
function KpiBox({label,value,color}){ return <div className="kpi" style={{borderTop:"3px solid "+(color||"var(--ocean)")}}>
  <div className="kn" style={{color:color||"var(--ocean)"}}>{value}</div><div className="kl">{label}</div></div>; }
function BarsH({data,color}){ const max=Math.max(1,...data.map(d=>d.value));
  if(!data.length) return <div className="hint">Sin datos en el período</div>;
  return <div style={{display:"flex",flexDirection:"column",gap:8}}>{data.map(d=>
    <div key={d.label} style={{display:"flex",alignItems:"center",gap:8}}>
      <div style={{flex:"0 0 40%",fontSize:12,textAlign:"right",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={d.label}>{d.label}</div>
      <div style={{flex:1,background:"#eef1f3",borderRadius:6,height:18}}><div style={{width:(d.value/max*100)+"%",background:color||"var(--ocean)",height:"100%",borderRadius:6,minWidth:d.value?4:0}}></div></div>
      <div style={{flex:"0 0 30px",fontWeight:800,fontSize:13}}>{d.value}</div></div>)}</div>;
}
function Tablero({tipo}){
  const isCom=tipo==="Compras"; const isSis=tipo==="Sistemas";
  const now=new Date();
  const [anio,setAnio]=useState(now.getFullYear()); const [mes,setMes]=useState(null);
  const [f,setF]=useState([]); const [cargando,setCargando]=useState(true);
  const anios=[now.getFullYear()-2,now.getFullYear()-1,now.getFullYear()];
  const MESES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  useEffect(()=>{ let vivo=true; (async()=>{ setCargando(true);
    try{ const data=mes==null?await Store.readAnio(tipo,anio):await Store.readMes(tipo,anio,mes); if(vivo) setF(data); }
    catch(e){ if(vivo) setF([]); } finally{ if(vivo) setCargando(false); } })(); return ()=>{vivo=false;}; },[anio,mes]);
  let kpis=[], extra=null;
  if(isCom){
    const aprob=f.filter(r=>["En compra","Listo para entregar","Entregado","Cerrada"].includes(r.Estado)).length;
    const rech=f.filter(r=>r.Estado==="Rechazada").length;
    const pend=f.filter(r=>["Solicitado","En Gerencia"].includes(r.Estado)).length;
    const entr=f.filter(r=>["Entregado","Cerrada"].includes(r.Estado)).length;
    kpis=[["Recibidas",f.length,"--ocean"],["Aprobadas",aprob,"--green"],["Rechazadas",rech,"--coral"],["Pendientes",pend,"--amber"],
      ["Entregadas",entr,"--blue"],["T. prom. aprobación",dPromMin(f,"FechaSolicitud","FechaAprob"),"--purple"],
      ["Calificación",dPromCal(f),"--green"],["Encuestas",f.filter(r=>r.EncuestaCal).length,"--blue"]];
    extra=<div className="card"><h3>Solicitudes por departamento</h3><BarsH data={dCuenta(f,"Area")} color="var(--ocean)"/></div>;
  } else {
    const concl=f.filter(r=>["Concluido","Cerrado"].includes(r.Estado)).length;
    const validas=f.filter(r=>r.Estado!=="Rechazado");
    const cumpl=validas.length?Math.round(concl/validas.length*100):0;
    kpis=[["Recibidas",f.length,"--ocean"],["Concluidas",concl,"--green"],["Cumplimiento",cumpl+"%",cumpl>=100?"--green":"--amber"],
      ["T. prom. respuesta",dPromMin(f,"FechaCreacion","FechaConcluido"),"--purple"],
      ["Calificación",dPromCal(f),"--green"],["Encuestas",f.filter(r=>r.EncuestaCal).length,"--blue"]];
    const prioCampo=isSis?"Urgencia":"TipoSolicitud";
    extra=<>
      <div className="card"><h3>Solicitudes por departamento</h3><BarsH data={dCuenta(f,"Departamento")} color="var(--ocean)"/></div>
      <div className="card"><h3>Por prioridad</h3><BarsH data={dCuenta(f,prioCampo)} color="var(--blue)"/></div>
      {!isSis && <div className="card"><h3>Cumplimiento de cierre</h3><BarsH data={dCuenta(f.filter(r=>r.CierreCumplimiento),"CierreCumplimiento")} color="var(--green)"/></div>}
    </>;
  }
  return <div>
    <div className="seg" style={{flexWrap:"wrap"}}>{anios.map(a=><button key={a} className={anio===a?"on":""} onClick={()=>setAnio(a)}>{a}</button>)}</div>
    <div className="seg" style={{flexWrap:"wrap"}}>
      <button className={mes==null?"on":""} onClick={()=>setMes(null)}>Año</button>
      {MESES.map((m,i)=><button key={m} className={mes===i?"on":""} onClick={()=>setMes(i)}>{m}</button>)}</div>
    {cargando ? <div className="hint" style={{padding:"20px 0"}}>Cargando datos del período…</div>
      : <><div className="kpis">{kpis.map(([l,v,c])=><KpiBox key={l} label={l} value={v} color={cssVar(c)}/>)}</div>{extra}</>}
  </div>;
}

function ReasignarResp({toast}){
  const [mod,setMod]=useState("ILD"); const [rows,setRows]=useState([]);
  const [area,setArea]=useState("__todas"); const [dest,setDest]=useState(""); const [busy,setBusy]=useState(false);
  const [campo,setCampo]=useState("aprobador"); // solo ILD: aprobador | responsable
  const areaField=mod==="ILD"?"area":(mod==="Compras"?"Area":"Departamento");
  const load=async()=>{ try{ setRows(await Store.read(mod)); }catch(e){ setRows([]); } };
  useEffect(()=>{ load(); setArea("__todas"); setCampo(mod==="ILD"?"aprobador":"solicitante"); },[mod]);
  const nombres=[...new Set(USERS.map(u=>u.nombre))].sort();
  const areas=[...new Set(rows.map(r=>r[areaField]).filter(Boolean))].sort();
  const areasAC=Object.keys(AC);
  const afect=rows.filter(r=>area==="__todas"||r[areaField]===area);
  const destList = (mod==="ILD"&&campo==="area")?areasAC:nombres;
  function setField(r){ if(mod!=="ILD") return {...r,Solicitante:dest};
    if(campo==="aprobador") return {...r,aprobadorEsperado:dest};
    if(campo==="area") return {...r,area:dest};
    return {...r,usuario:dest}; }
  async function aplicar(){ if(!dest){toast("Elige el destino");return;}
    if(!afect.length){toast("No hay registros para reasignar");return;}
    const etiqueta = mod==="ILD"?(campo==="aprobador"?"aprobador":campo==="area"?"área":"responsable"):"solicitante";
    if(!confirm(`Cambiar el ${etiqueta} de ${afect.length} registro(s) de ${mod}${area!=="__todas"?(" · "+area):""} a "${dest}"?`))return;
    setBusy(true);
    try{ const all=await Store.read(mod); const set=new Set(afect.map(r=>r.id));
      const upd=all.map(r=>set.has(r.id)?setField(r):r);
      await Store.write(mod,upd); toast(`Actualizados ${afect.length} registro(s)`); load();
    }catch(e){ toast("No se pudo: "+(e.message||"")); } finally{ setBusy(false); }
  }
  async function restaurarResp(){
    if(!confirm("Restaurar el responsable (quien envió) de los ILD a su valor original del histórico cargado?")) return;
    setBusy(true);
    try{ const all=await Store.read("ILD"); const orig=new Map((typeof ILD_SEED!=="undefined"?ILD_SEED:[]).map(s=>[s.id,s.usuario]));
      let n=0; const upd=all.map(r=>{ if(orig.has(r.id)&&orig.get(r.id)&&r.usuario!==orig.get(r.id)){ n++; return {...r,usuario:orig.get(r.id)}; } return r; });
      if(n){ await Store.write("ILD",upd); } toast(n?`Restaurados ${n} responsable(s)`:"No había nada que restaurar"); load();
    }catch(e){ toast("No se pudo restaurar: "+(e.message||"")); } finally{ setBusy(false); }
  }
  return <div className="card"><h3>🔁 Reasignar aprobador / responsable</h3>
    <div className="hint">Para que el histórico de un área le aparezca a un aprobador en su bandeja, reasigna el <b>aprobador</b>. (También puedes cambiar el responsable si lo necesitas.)</div>
    <div className="row" style={{marginTop:10,gap:8,flexWrap:"wrap"}}>
      <select className="inp" style={{flex:1,minWidth:130}} value={mod} onChange={e=>setMod(e.target.value)}>{["ILD"].map(m=><option key={m}>{m}</option>)}</select>
      <select className="inp" style={{flex:1,minWidth:130}} value={area} onChange={e=>setArea(e.target.value)}><option value="__todas">Todas las áreas</option>{areas.map(a=><option key={a} value={a}>{a}</option>)}</select>
    </div>
    {mod==="ILD" && <Field label="¿Qué quieres reasignar?"><select className="inp" value={campo} onChange={e=>{setCampo(e.target.value);setDest("");}}>
      <option value="aprobador">Aprobador (para que le salga a aprobar)</option>
      <option value="area">Área (corregir el nombre en los registros)</option>
      <option value="responsable">Responsable (quien envió)</option></select></Field>}
    <Field label={(mod==="ILD"&&campo==="area")?"Área destino (nombre actual)":"Persona destino"}><select className="inp" value={dest} onChange={e=>setDest(e.target.value)}><option value="">— elegir —</option>{destList.map(n=><option key={n}>{n}</option>)}</select></Field>
    <div className="hint">Se afectarán <b>{afect.length}</b> registro(s).</div>
    <button className="btn primary block" style={{marginTop:10}} disabled={busy} onClick={aplicar}>{busy?"Aplicando…":"🔁 Aplicar"}</button>
    <button className="btn ghost block" style={{marginTop:8}} disabled={busy} onClick={restaurarResp}>♻️ Restaurar responsable original (ILD)</button>
  </div>;
}

      <div className="hint" style={{marginBottom:6}}>Usuarios registrados:</div>
      {users===null && <div className="hint">Cargando…</div>}
      {users && !users.length && <div className="hint">Aún no hay usuarios.</div>}
      {users && users.map((u,i)=><div key={u.uid||i} className="item">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <div><b>{u.nombre}</b> <span style={{color:"var(--muted)",fontSize:12}}>· {rolLbl[u.rol]||u.rol}{u.rol==="colaborador"&&u.slug?(" · "+u.slug):""}{(u.areas&&u.areas.length)?(" · "+u.areas.join(", ")):""}</span></div>
          <button className="btn ghost" style={{padding:"3px 10px",fontSize:12}} onClick={()=>editUid===u.uid?setEditUid(""):abrirEdit(u)}>{editUid===u.uid?"Cerrar":"Editar"}</button>
        </div>
        {editUid===u.uid && <div style={{marginTop:8,padding:10,background:"#f6f8f9",borderRadius:8}}>
          <input className="inp" placeholder="Nombre" value={eNombre} onChange={e=>setENombre(e.target.value)}/>
          <select className="inp" style={{marginTop:8}} value={eRol} onChange={e=>setERol(e.target.value)}>
            <option value="colaborador">Colaborador</option>
            <option value="aprobador">Aprobador</option>
            <option value="gerencia">Gerencia</option>
            <option value="desarrollador">Desarrollador (admin)</option>
          </select>
          {(eRol==="aprobador"||eRol==="colaborador") && <div style={{marginTop:8}}>
            <div className="hint" style={{marginBottom:4}}>Áreas asignadas:</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {areaOpts.map(a=><button key={a} onClick={()=>toggleEArea(a)} style={{padding:"4px 10px",borderRadius:999,border:"1px solid #d7dee2",background:eAreas.includes(a)?"var(--ocean)":"#fff",color:eAreas.includes(a)?"#fff":"#33474f",fontSize:12,cursor:"pointer"}}>{a}</button>)}
            </div>
          </div>}
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button className="btn primary" style={{padding:"5px 12px"}} disabled={busy} onClick={()=>guardarEdit(u)}>Guardar</button>
            <button className="btn ghost" style={{padding:"5px 12px",color:"#c0392b"}} disabled={busy} onClick={()=>eliminar(u)}>Eliminar</button>
          </div>
          <div className="hint" style={{marginTop:8}}>El nombre, rol y áreas se editan aquí. La contraseña o el código se cambian en Firebase → Authentication.</div>
        </div>}
      </div>)}
      <div className="hint" style={{marginTop:8}}>Para cambiar el código de alguien o desactivar una cuenta, se hace en la consola de Firebase → Authentication. Crear personas nuevas se hace aquí.</div>
    </div>
  </div>;
}
function FotoCleanup({toast}){
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState("");
  async function limpiar(){ if(!confirm("¿Borrar las fotos de más de 2 meses? Se conservan los registros (cumplimiento, quién subió, quién aprobó, observaciones); solo se eliminan las imágenes para liberar espacio. Esta acción no se puede deshacer.")) return;
    setBusy(true); setMsg("");
    try{ const n=await limpiarFotosViejas(); setMsg("Listo: se borraron "+n+" foto(s) de más de 2 meses."); toast&&toast("Fotos limpiadas: "+n); }
    catch(e){ setMsg("No se pudo: "+(e.message||e)); }
    setBusy(false);
  }
  return <div className="card"><h3>🧹 Mantenimiento de fotos</h3>
    <div className="hint">Las fotos ocupan espacio. Aquí borras las de más de <b>2 meses</b>. Los registros (cumplimiento, quién, observaciones) se conservan siempre. Antes de limpiar, descarga en PDF los ILD cuyas fotos quieras guardar como referencia.</div>
    <div className="row" style={{marginTop:10}}><button className="btn ocean" disabled={busy} onClick={limpiar}>{busy?"Limpiando…":"🧹 Limpiar fotos de más de 2 meses"}</button></div>
    {msg && <div className="hint" style={{marginTop:8}}>{msg}</div>}
  </div>;
}
function Admin({user,toast}){
  const [counts,setCounts]=useState({}); const [reloadKey,setReloadKey]=useState(0); const [diag,setDiag]=useState("");
  useEffect(()=>{(async()=>{ const o={}; for(const t of ["ILD"]) o[t]=(await Store.read(t)).length; setCounts(o); })();},[reloadKey]);
  async function exportar(t){ const data=await Store.read(t);
    if(!data.length){toast("Sin datos en "+t);return;}
    const rows = t==="ILD" ? data.map(ildToRow) : data;
    exportXLSX(rows,t,`${t}_WAO_${yr()}`); toast("Exportando "+t+"…"); }
  function toggleMode(){ const nm=MODE==="graph"?"local":"graph";
    if(!confirm(nm==="graph"?"Conectar a Google Drive (en vivo)? Se recargará la app.":"Cambiar a modo local (demo)? Se recargará la app.")) return;
    localStorage.setItem("pp_mode",nm); location.reload(); }
  async function cargarHistorico(){
    if(!confirm("Cargar el histórico de ILD ("+ILD_SEED.length+" registros)? No se duplican los ya cargados.")) return;
    try{
      const cur=await Store.read("ILD"); const ids=new Set(cur.map(r=>r.id));
      const add=ILD_SEED.filter(r=>!ids.has(r.id));
      if(!add.length){ toast("El histórico ya está cargado"); return; }
      await Store.write("ILD",[...add,...cur].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)));
      toast("Histórico cargado: "+add.length+" ILD"); setReloadKey(k=>k+1);
    }catch(e){ toast("No se pudo cargar el histórico ("+(e.message||"")+")"); }
  }
  return <div>
    <h1 className="h1">Configuración</h1><p className="sub">Conexión, datos y mantenimiento.</p>
    <div className="card"><h3>☁️ Conexión (Firebase)</h3>
      <div className="kv"><b>Modo</b><span>{MODE==="graph"?"En vivo (Firebase)":"Local (demo)"}</span></div>
      {MODE==="graph" && <div className="kv"><b>Cuenta</b><span>{graphUser||"—"}</span></div>}
      <div className="kv"><b>Registros</b><span>ILD {counts.ILD||0}</span></div>
      <div className="kv"><b>Versión</b><span>{APP.version}</span></div>
      <div className="kv" style={{flexDirection:"column",alignItems:"flex-start",gap:4}}><b>Origen autorizado (regístralo en Google Cloud)</b>
        <code style={{fontSize:12,wordBreak:"break-all",background:"#f3efe6",padding:"4px 8px",borderRadius:8,width:"100%"}}>{window.location.origin}</code></div>
      <div className="row" style={{marginTop:10}}>
        <button className="btn ocean" onClick={()=>setReloadKey(k=>k+1)}>🔄 Sincronizar</button>
        <button className="btn ghost" onClick={toggleMode}>{MODE==="graph"?"Cambiar a demo local":"Conectar a Google Drive"}</button></div>
      <div className="hint" style={{marginTop:8}}>El histórico se guarda en {MODE==="graph"?"la base de datos segura (Firebase) y se abre desde cualquier dispositivo al iniciar sesión.":"este navegador (modo demo)."}</div>
    </div>
    {MODE==="graph" && <div className="card"><h3>🩺 Diagnóstico de conexión</h3>
      <div className="hint">Si algo no se graba, toca “Probar conexión”: verifica tu sesión de Google, la carpeta WAO_NEXO y el permiso de escritura.</div>
      <div className="row" style={{marginTop:10}}>
        <button className="btn ocean" disabled={diag==="...probando..."} onClick={async()=>{ setDiag("...probando..."); try{ setDiag(await diagListas()); }catch(e){ setDiag("Error: "+(e.message||e)); } }}>▶ Probar conexión</button>
        <button className="btn ghost" onClick={()=>{ if(confirm("Cerrar sesión de Google y volver a entrar? Sirve para refrescar permisos.")) msSignOut(); }}>🔁 Reconectar Google</button>
      </div>
      {diag && <pre style={{whiteSpace:"pre-wrap",background:"#0e1b22",color:"#d6f0f4",padding:12,borderRadius:10,fontSize:12.5,marginTop:10,lineHeight:1.5}}>{diag}</pre>}
    </div>}
    <FotoCleanup toast={toast}/>
    <div className="card"><h3>📊 Exportar histórico a Excel</h3>
      <div className="row">{["ILD"].map(t=><button key={t} className="btn green" onClick={()=>exportar(t)}>⬇ {t}</button>)}</div>
      <div className="hint" style={{marginTop:8}}>Cada jefatura también puede exportar sus ILD desde ILD → bandeja.</div></div>
        <DeleteRecords toast={toast}/>
    <ReasignarResp toast={toast}/>
    
  </div>;
}

/* ===== APP ROOT ===== */
function App(){
  const [user,setUser]=useState(()=>{ try{return JSON.parse(localStorage.getItem("pp_user"))}catch{return null} });
  const [view,setView]=useState("home"); const [toastMsg,setToastMsg]=useState(""); const [counts,setCounts]=useState({});
  const [foto,setFoto]=useState(null); const [gerr,setGerr]=useState(""); const [cfgVer,setCfgVer]=useState(0);
  const [authReady,setAuthReady]=useState(false); const [loggingIn,setLoggingIn]=useState(false); const [loginErr,setLoginErr]=useState("");
  const [notifs,setNotifs]=useState([]); const [notifOpen,setNotifOpen]=useState(false); const [detailIld,setDetailIld]=useState(null);
  const bump=()=>setCfgVer(v=>v+1);
  async function loadNotifs(u){ const who=u||user; if(!who) return;
    try{ const all=await Store.read("Notif"); setNotifs(all.filter(n=>n.para===who.nombre)); }catch{} }
  async function abrirNotif(n){
    try{ await Store.remove("Notif", n.id); }catch{}
    try{ const ilds=await Store.read("ILD"); const rec=ilds.find(r=>r.id===n.ildId); if(rec) setDetailIld(rec); }catch{}
    setNotifOpen(false); loadNotifs();
  }
  useEffect(()=>{
    const unsub=onAuth(async(fbu)=>{
      if(fbu){ const prof=await loadProfile(fbu);
        if(!prof){ setLoginErr("Tu cuenta no está configurada o fue desactivada. Contacta al administrador."); setUser(null); try{ if(fbAuth) await fbAuth.signOut(); }catch(e){} return; }
        try{ applyIldConfig(await cfgRead()); }catch(e){}
        try{ const all=await listUsers(); if(all&&all.length){ USERS.length=0; all.forEach(x=>USERS.push(x)); if(typeof applyGestiona==="function") applyGestiona(); } }catch(e){}
        setUser(prof); bump(); }
      else { setUser(null); }
      setAuthReady(true);
    });
    return ()=>{ try{ unsub&&unsub(); }catch(e){} };
  },[]);
  const toast=m=>{ setToastMsg(m); const dur=/no se pudo|error|❌|403|falló|no encontr|presupuesto/i.test(m)?8000:2600; setTimeout(()=>setToastMsg(""),dur); };
  async function reloadCounts(u){ const who=u||user; if(!who) return;
    const il=await Store.read("ILD");
    setCounts({
      ild:(esGD(who)||who.rol==='aprobador')?il.filter(r=>r.estado==='Pendiente'&&(esGD(who)||(who.areas||[]).includes(r.area))).length:0
    });
  }
  useEffect(()=>{ if(user){ reloadCounts(); loadNotifs(); } },[user,view,cfgVer]);
  async function handleLogin(email,pass){ setLoginErr(""); setLoggingIn(true);
    const ok=await msSignInEmail(email,pass); setLoggingIn(false);
    if(!ok) setLoginErr(msErr||"No se pudo iniciar sesión"); return ok; }
  async function handleLoginColab(slug,code){ setLoginErr(""); setLoggingIn(true);
    const ok=await signInColaborador(slug,code); setLoggingIn(false);
    if(!ok) setLoginErr(msErr||"Código incorrecto"); return ok; }
  async function logout(){ await msSignOut(); }
  if(!authReady) return <div className="login"><div className="sun"></div><div className="lcard">
    <div className="loginlogo"><img src={LOGO_B} alt="WAO HOTELS - ILD's"/></div>
    <div className="ltag" style={{marginBottom:0}}>Cargando…</div></div></div>;
  if(!user) return <Login onLogin={handleLogin} onLoginColab={handleLoginColab} busy={loggingIn} err={loginErr}/>;
  const rolLbl={desarrollador:"Desarrollador",gerencia:"Gerencia",aprobador:"Aprobador",colaborador:"Colaborador"}[user.rol]||user.rol;
  const titles={ild:"ILD",admin:"Configuración"};
  return <div className="app">
    <div className="topbar"><div className="brand"><span className="logobox"><img src={LOGO} alt="WAO HOTELS - ILD's"/></span></div><div className="sp"></div>
      <div className="who">{user.nombre}<br/><span style={{opacity:.85}}>{rolLbl}</span></div>
      <button className="iconbtn" title="Notificaciones" style={{position:"relative"}} onClick={()=>setNotifOpen(true)}>🔔
        {notifs.length>0 && <span style={{position:"absolute",top:-4,right:-4,background:"var(--coral)",color:"#fff",borderRadius:"999px",fontSize:10,fontWeight:800,minWidth:18,height:18,display:"grid",placeItems:"center",padding:"0 4px"}}>{notifs.length}</span>}</button>
      <button className="iconbtn" title="Salir" onClick={logout}>⎋</button></div>
    <div className="content">
      {gerr && <div className="banner">⚠️ {gerr}</div>}
      {view!=="home" && <div className="backrow"><button className="backbtn" onClick={()=>setView("home")}>← Inicio</button>
        <span style={{color:"var(--muted)",fontWeight:600}}>{titles[view]}</span></div>}
      {view==="home" && <Home user={user} go={setView} counts={counts}/>}
      {view==="ild" && <ILD key={cfgVer} user={user} toast={toast} setFoto={setFoto} bump={bump}/>}
      {view==="admin" && <Admin user={user} toast={toast}/>}
    </div>
    {toastMsg && <div className="toast">{toastMsg}</div>}
    <FotoModal src={foto} onClose={()=>setFoto(null)}/>
    {notifOpen && <Modal title="🔔 Notificaciones" onClose={()=>setNotifOpen(false)}>
      {!notifs.length && <div className="empty"><div className="e">📭</div>No tienes notificaciones</div>}
      {notifs.map(n=><div key={n.id} className="item" style={{cursor:"pointer"}} onClick={()=>abrirNotif(n)}>
        <div className="ttl" style={{fontSize:14}}>{n.texto}</div>
        <div className="meta">{fmtDT(n.fecha)} · toca para ver el ILD</div></div>)}
      {notifs.length>0 && <div className="hint">Al abrir una notificación, se marca como leída y desaparece.</div>}
    </Modal>}
    {detailIld && <ILDDetail user={user} r={detailIld} onClose={()=>{setDetailIld(null);loadNotifs();}} reload={()=>{}} toast={toast} setFoto={setFoto}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
(function(){
  function show(msg){ var r=document.getElementById("root"); if(r&&r.children.length>0)return;
    r.innerHTML='<div style="max-width:560px;margin:40px auto;padding:20px;font-family:Inter,system-ui,sans-serif;color:#211D1E">'+
      '<h2 style="color:#00545D">WAO HOTELS - ILD's no pudo cargar</h2><p style="color:#6c7a7c">'+msg+'</p>'+
      '<p style="color:#6c7a7c;font-size:13px">Si lo ves en la vista previa, descarga el archivo y ábrelo en tu navegador o súbelo a GitHub Pages.</p></div>'; }
  window.addEventListener("error",function(e){ show("Detalle: "+(e.message||"error al cargar un recurso")); });
  window.addEventListener("load",function(){ setTimeout(function(){
    if(typeof React==="undefined") return show("No se cargó React (la red bloqueó la CDN).");
    show("La aplicación no se inició. Abre la consola (F12) para más detalle."); },1800); });
})();
</script>
</body>
